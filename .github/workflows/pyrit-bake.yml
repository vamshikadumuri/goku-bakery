name: PyRIT Image Bake

on:
  workflow_dispatch:
    inputs:
      pyrit_version:
        description: 'PyRIT version to install from PyPI (e.g. 0.13.0)'
        required: true
        default: '0.13.0'
      push_latest:
        description: 'Also tag as :latest'
        required: false
        default: 'true'

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      packages: write
      contents: read

    steps:
      - name: Free up disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Clone PyRIT repository
        run: |
          git clone --depth=1 https://github.com/microsoft/PyRIT.git pyrit-src
          cd pyrit-src
          echo "PYRIT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Build devcontainer base image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -f pyrit-src/.devcontainer/Dockerfile \
            -t pyrit-devcontainer:base \
            pyrit-src

      - name: Build and push PyRIT production image
        env:
          PYRIT_VERSION: ${{ inputs.pyrit_version }}
          PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_BASE="ghcr.io/${OWNER_LOWER}/pyrit"

          TAGS="-t ${IMAGE_BASE}:${PYRIT_VERSION}"
          if [ "$PUSH_LATEST" = "true" ]; then
            TAGS="$TAGS -t ${IMAGE_BASE}:latest"
          fi

          DOCKER_BUILDKIT=1 docker build \
            -f pyrit-src/docker/Dockerfile \
            --build-arg BASE_IMAGE=pyrit-devcontainer:base \
            --build-arg PYRIT_SOURCE=pypi \
            --build-arg PYRIT_VERSION="${PYRIT_VERSION}" \
            --build-arg GIT_COMMIT="${PYRIT_COMMIT}" \
            --build-arg GIT_MODIFIED=false \
            $TAGS \
            pyrit-src

          docker push "${IMAGE_BASE}:${PYRIT_VERSION}"
          if [ "$PUSH_LATEST" = "true" ]; then
            docker push "${IMAGE_BASE}:latest"
          fi

          echo "Pushed: ${IMAGE_BASE}:${PYRIT_VERSION}"
          if [ "$PUSH_LATEST" = "true" ]; then
            echo "Pushed: ${IMAGE_BASE}:latest"
          fi
