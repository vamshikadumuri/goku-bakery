name: MLBakery Datasets Bake

on:
  workflow_dispatch:
    inputs:
      datasets:
        description: >
          Space-separated list of datasets to include (leave empty for all).
          Options: harmbench xstest medsafetybench mlcommons_ailuminate
          multilingual_vulnerability visual_leak_bench aya_redteaming
          jbb_behaviors forbidden_questions harmbench_hf beaver_tails
          salad_bench simple_safety_tests sorry_bench toxic_chat
          pku_safe_rlhf transphobia_awareness promptintel
        required: false
        default: ''
      tag:
        description: 'Image tag (default: pyrit-datasets)'
        required: false
        default: 'pyrit-datasets'

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      packages: write
      contents: read

    steps:
      - name: Free up disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /usr/share/swift
          sudo apt-get clean
          sudo docker image prune -af || true
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Prepare download args
        id: prep
        run: |
          DATASETS="${{ inputs.datasets }}"
          TAG="${{ inputs.tag }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/mlbakery:${TAG:-pyrit-datasets}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

          # If specific datasets requested, pass them as CMD override args
          if [[ -n "${DATASETS}" ]]; then
            DATASETS_ARG="python /download_datasets.py ${DATASETS}"
          else
            DATASETS_ARG=""
          fi
          echo "datasets_arg=${DATASETS_ARG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: goku/mlbakery/datasets
          file: goku/mlbakery/datasets/Dockerfile
          push: true
          no-cache: true
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          tags: ${{ steps.prep.outputs.image }}

      - name: Verify image manifest
        run: |
          IMAGE="${{ steps.prep.outputs.image }}"
          echo "==> Pulling and verifying ${IMAGE}"
          docker pull "${IMAGE}"
          docker run --rm "${IMAGE}"
