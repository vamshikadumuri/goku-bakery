name: PyRIT Image Bake

on:
  workflow_dispatch:
    inputs:
      pyrit_version:
        description: 'PyRIT version to install from PyPI (e.g. 0.13.0)'
        required: true
        default: '0.13.0'

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      packages: write
      contents: read

    steps:
      - name: Free up disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      # Clone at the version tag so the local pyrit/ source (which PyRIT's
      # Dockerfile unconditionally COPYs into /app/pyrit/) matches the PyPI
      # version we're installing. Otherwise `import pyrit` from /app reports
      # the dev version from main branch instead of the installed PyPI version.
      - name: Clone PyRIT at version tag
        env:
          VERSION: ${{ inputs.pyrit_version }}
        run: |
          git clone --depth=1 --branch "v${VERSION}" https://github.com/microsoft/PyRIT.git pyrit-src
          echo "PYRIT_COMMIT=$(git -C pyrit-src rev-parse HEAD)" >> $GITHUB_ENV
          echo "Local source version:"
          grep -E '__version__' pyrit-src/pyrit/__init__.py || true

      - name: Build devcontainer base image
        uses: docker/build-push-action@v5
        with:
          context: pyrit-src
          file: pyrit-src/.devcontainer/Dockerfile
          push: false
          load: true
          tags: pyrit-devcontainer:base

      - name: Build and push PyRIT production image
        uses: docker/build-push-action@v5
        with:
          context: pyrit-src
          file: pyrit-src/docker/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=pyrit-devcontainer:base
            PYRIT_SOURCE=pypi
            PYRIT_VERSION=${{ inputs.pyrit_version }}
            GIT_COMMIT=${{ env.PYRIT_COMMIT }}
            GIT_MODIFIED=false
          tags: |
            ghcr.io/${{ github.repository_owner }}/pyrit:${{ inputs.pyrit_version }}-v1
            ghcr.io/${{ github.repository_owner }}/pyrit:latest

      - name: Verify installed PyRIT version
        env:
          VERSION: ${{ inputs.pyrit_version }}
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LOWER}/pyrit:${VERSION}-v1"
          echo "Pulling and verifying ${IMAGE}..."
          docker pull "${IMAGE}"

          echo "--- From /app (default WORKDIR, picks up local source) ---"
          docker run --rm --entrypoint="" -w /app "${IMAGE}" \
            /opt/venv/bin/python -c "import pyrit; print(pyrit.__version__)"

          echo "--- From /tmp (picks up installed PyPI package) ---"
          INSTALLED=$(docker run --rm --entrypoint="" -w /tmp "${IMAGE}" \
            /opt/venv/bin/python -c "import pyrit; print(pyrit.__version__)")
          echo "Installed: ${INSTALLED}"

          if [ "${INSTALLED}" != "${VERSION}" ]; then
            echo "ERROR: expected ${VERSION}, got ${INSTALLED}"
            exit 1
          fi
          echo "OK: PyRIT ${INSTALLED} matches requested ${VERSION}"
