name: MLBakery Bake

on:
  workflow_dispatch:
    inputs:
      model_repo:
        description: 'HuggingFace model repo (e.g. Qwen/Qwen2.5-Coder-32B)'
        required: true
        default: 'Qwen/Qwen2.5-Coder-32B'
      start_shard:
        description: 'Start from shard number (for resuming)'
        required: false
        default: '1'
      exclude_patterns:
        description: 'Comma-separated exclude patterns (for resuming)'
        required: false
        default: ''

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      packages: write
      contents: read

    steps:
      - name: Free up disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Checkout vk-dev
        uses: actions/checkout@v4
        with:
          ref: vk-dev

      - name: Install dependencies
        run: |
          pip install huggingface_hub hf_transfer
          echo "Python: $(python3 --version) at $(which python3)"
          echo "HF CLI: $(which huggingface-cli || echo 'NOT FOUND')"
          python3 -c "import huggingface_hub; print('huggingface_hub', huggingface_hub.__version__)"

      - name: Setup bake environment
        run: |
          # Create the venv directory bake.sh expects with symlinks to system python
          VENV_DIR="goku/mlbakery/.claude/skills/mlbakery/mymlbakeryenv"
          mkdir -p "$VENV_DIR/bin"
          ln -sf "$(which python3)" "$VENV_DIR/bin/python3"
          # Verify the symlinked python can import huggingface_hub
          "$VENV_DIR/bin/python3" -c "import huggingface_hub; print('Venv python OK')"
          # Login to HuggingFace
          echo "HF_TOKEN length: ${#HF_TOKEN}"
          huggingface-cli login --token "$HF_TOKEN" || python3 -c "from huggingface_hub import login; login(token='$HF_TOKEN')"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Run bake
        working-directory: goku/mlbakery
        env:
          HF_HUB_ENABLE_HF_TRANSFER: '1'
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          ARGS="-m ${{ inputs.model_repo }}"
          if [ "${{ inputs.start_shard }}" != "1" ]; then
            ARGS="$ARGS -s ${{ inputs.start_shard }}"
          fi
          if [ -n "${{ inputs.exclude_patterns }}" ]; then
            ARGS="$ARGS -e '${{ inputs.exclude_patterns }}'"
          fi
          # Debug: show environment and verify paths
          echo "PWD: $(pwd)"
          ls -la .claude/skills/mlbakery/mymlbakeryenv/bin/python3
          .claude/skills/mlbakery/mymlbakeryenv/bin/python3 -c "from huggingface_hub import list_repo_files; print(list(list_repo_files('${{ inputs.model_repo }}'))[:3])"
          echo "Running: bash .claude/skills/mlbakery/scripts/bake.sh $ARGS"
          eval bash .claude/skills/mlbakery/scripts/bake.sh $ARGS
