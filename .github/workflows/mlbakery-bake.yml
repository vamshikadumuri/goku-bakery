name: MLBakery Bake

on:
  workflow_dispatch:
    inputs:
      model_repo:
        description: 'HuggingFace model repo (e.g. Qwen/Qwen2.5-Coder-32B)'
        required: true
        default: 'Qwen/Qwen2.5-Coder-32B'
      start_shard:
        description: 'Start from shard number (for resuming)'
        required: false
        default: '1'
      exclude_patterns:
        description: 'Comma-separated exclude patterns (for resuming)'
        required: false
        default: ''

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      packages: write
      contents: read
      issues: write

    steps:
      - name: Free up disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Checkout vk-dev
        uses: actions/checkout@v4
        with:
          ref: vk-dev

      - name: Install dependencies
        run: |
          pip install huggingface_hub hf_transfer
          echo "Python: $(python3 --version) at $(which python3)"
          python3 -c "import huggingface_hub; print('huggingface_hub', huggingface_hub.__version__)"

      - name: Setup bake environment
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          VENV_DIR="goku/mlbakery/.claude/skills/mlbakery/mymlbakeryenv"
          mkdir -p "$VENV_DIR/bin"
          REAL_PYTHON="$(which python3)"
          printf '#!/bin/bash\nexec %s "$@"\n' "$REAL_PYTHON" > "$VENV_DIR/bin/python3"
          chmod +x "$VENV_DIR/bin/python3"
          echo "Wrapper python: $(\"$VENV_DIR/bin/python3\" --version)"
          python3 -c "import huggingface_hub; print('OK:', huggingface_hub.__version__)"
          python3 -c "
import os
from huggingface_hub import login
login(token=os.environ['HF_TOKEN'])
print('HF login OK')
"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Verify bake prerequisites
        working-directory: goku/mlbakery
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "PWD: $(pwd)"
          echo "Venv python:"
          ls -la .claude/skills/mlbakery/mymlbakeryenv/bin/python3
          echo "Docker:"
          docker info 2>&1 | head -3
          echo "Test list_repo_files:"
          python3 -c "
from huggingface_hub import list_repo_files
files = list(list_repo_files('${{ inputs.model_repo }}'))
safetensors = [f for f in files if f.endswith('.safetensors')]
onnx = [f for f in files if f.endswith('.onnx')]
print(f'Total files: {len(files)}, safetensors: {len(safetensors)}, onnx: {len(onnx)}')
"

      - name: Run bake
        id: bake
        continue-on-error: true
        working-directory: goku/mlbakery
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          ARGS="-m ${{ inputs.model_repo }}"
          if [ "${{ inputs.start_shard }}" != "1" ]; then
            ARGS="$ARGS -s ${{ inputs.start_shard }}"
          fi
          if [ -n "${{ inputs.exclude_patterns }}" ]; then
            ARGS="$ARGS -e '${{ inputs.exclude_patterns }}'"
          fi
          echo "Running bake.sh..."
          eval bash .claude/skills/mlbakery/scripts/bake.sh $ARGS 2>&1 | tee /tmp/bake.log

      - name: Upload bake log
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          if [ -f /tmp/bake.log ]; then
            echo "=== Last 200 lines of bake.log ==="
            tail -200 /tmp/bake.log
            CONTENT=$(base64 -w 0 /tmp/bake.log | head -c 60000)
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            curl -s -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/contents/bake_logs/log_${TIMESTAMP}.txt" \
              -d "{\"message\":\"Bake log $TIMESTAMP\",\"content\":\"$CONTENT\",\"branch\":\"main\"}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('content',{}).get('html_url', d.get('message','')))"
          else
            echo "No bake.log found"
          fi
