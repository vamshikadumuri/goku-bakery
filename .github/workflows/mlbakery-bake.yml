name: MLBakery Bake

on:
  workflow_dispatch:
    inputs:
      model_repo:
        description: 'HuggingFace model repo (e.g. Qwen/Qwen2.5-Coder-32B)'
        required: true
        default: 'Qwen/Qwen2.5-Coder-32B'
      start_shard:
        description: 'Start from shard number (for resuming)'
        required: false
        default: '1'
      exclude_patterns:
        description: 'Comma-separated exclude patterns (for resuming)'
        required: false
        default: ''

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      packages: write
      contents: read

    steps:
      - name: Free up disk space
        run: |
          echo "Before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/local/share/boost
          sudo apt-get clean
          echo "After cleanup:"
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install HuggingFace tools
        run: |
          pip install hf_transfer huggingface-hub
          echo "huggingface-cli path: $(which huggingface-cli || echo NOT FOUND)"
          python3 -m huggingface_hub.commands.huggingface_cli version || true

      - name: Login to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "HF_TOKEN length: ${#HF_TOKEN}"
          python3 -m huggingface_hub.commands.huggingface_cli login --token "$HF_TOKEN"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Run bake
        working-directory: goku/mlbakery
        env:
          HF_HUB_ENABLE_HF_TRANSFER: '1'
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          ARGS="-m ${{ inputs.model_repo }}"
          if [ "${{ inputs.start_shard }}" != "1" ]; then
            ARGS="$ARGS -s ${{ inputs.start_shard }}"
          fi
          if [ -n "${{ inputs.exclude_patterns }}" ]; then
            ARGS="$ARGS -e '${{ inputs.exclude_patterns }}'"
          fi
          echo "Running: bash .claude/skills/mlbakery/scripts/bake.sh $ARGS"
          eval bash .claude/skills/mlbakery/scripts/bake.sh $ARGS
