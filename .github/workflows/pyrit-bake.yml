name: PyRIT Image Bake

on:
  workflow_dispatch:
    inputs:
      pyrit_version:
        description: 'PyRIT version to install from PyPI (e.g. 0.14.0)'
        required: true
        default: '0.14.0'

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      packages: write
      contents: read

    steps:
      - name: Free up disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Clone PyRIT at version tag
        env:
          VERSION: ${{ inputs.pyrit_version }}
        run: |
          git clone --depth=1 --branch "v${VERSION}" https://github.com/microsoft/PyRIT.git pyrit-src
          echo "PYRIT_COMMIT=$(git -C pyrit-src rev-parse HEAD)" >> $GITHUB_ENV

      # Push devcontainer to GHCR so the production build can reference it
      # as BASE_IMAGE across both platforms (load: true doesn't work for multi-platform)
      - name: Build and push devcontainer base image
        uses: docker/build-push-action@v5
        with:
          context: pyrit-src
          file: pyrit-src/.devcontainer/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/pyrit-devcontainer:${{ inputs.pyrit_version }}

      - name: Build and push PyRIT production image
        uses: docker/build-push-action@v5
        with:
          context: pyrit-src
          file: pyrit-src/docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/pyrit-devcontainer:${{ inputs.pyrit_version }}
            PYRIT_SOURCE=local
            PYRIT_VERSION=${{ inputs.pyrit_version }}
            GIT_COMMIT=${{ env.PYRIT_COMMIT }}
            GIT_MODIFIED=false
          tags: |
            ghcr.io/${{ github.repository_owner }}/pyrit:${{ inputs.pyrit_version }}-v1
            ghcr.io/${{ github.repository_owner }}/pyrit:latest
